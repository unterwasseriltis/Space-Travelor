<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Voyage</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Startmenü -->
    <div id="menu-screen" class="screen">
        <h1>Solar Voyage</h1>
        <button id="new-game">Neues Spiel</button>
        <button id="load-game">Spiel Laden</button>
        <button id="exit-game">Spiel Beenden</button>
    </div>

    <!-- Spiel-Screen -->
    <div id="game-screen" class="screen hidden">
        
        <!-- Top-Bar -->
        <div class="top-bar">
            <span id="location">Standort: Erde</span>
            <span id="timer">Missionszeit: 00:00:00</span>
        </div>

        <!-- 2D Karte oben links -->
        <div class="map-container">
            <canvas id="solar-map" width="280" height="280"></canvas>
            <div class="map-label">Sonnensystem (2D)</div>
        </div>

        <!-- Schiff-Status (Rumpf + Schilde) -->
        <div class="ship-status">
            <div class="status-bar">
                <span class="status-label">Rumpf</span>
                <div class="bar-container">
                    <div id="hull-bar" class="bar hull-bar" style="width: 100%;"></div>
                </div>
                <span id="hull-value" class="status-value">100 %</span>
            </div>
            <div class="status-bar">
                <span class="status-label">Schilde</span>
                <div class="bar-container">
                    <div id="shield-bar" class="bar shield-bar" style="width: 100%;"></div>
                </div>
                <span id="shield-value" class="status-value">100 %</span>
            </div>
        </div>

        <!-- Ressourcen-Counter oben rechts -->
        <div class="resources-counter">
            <div class="resource-item">
                <span class="resource-symbol">H</span>
                <span id="hydrogen" class="resource-value">0</span>
            </div>
            <div class="resource-item">
                <span class="resource-symbol">He</span>
                <span id="helium" class="resource-value">0</span>
            </div>
            <div class="resource-item">
                <span class="resource-symbol">Li</span>
                <span id="lithium" class="resource-value">0</span>
            </div>
        </div>

        <!-- Hauptspiel-Layout -->
        <div class="game-container">
            
            <!-- Linke Seite: Raumschiff-Ausrüstung -->
            <div class="panel left-panel" id="ship-slots"></div>

            <!-- Mitte: Navigation -->
            <div class="panel center-panel">
                <h2>Navigation</h2>
                <div id="current-coordinates" class="coordinates">Koordinaten: —</div>
                <select id="destination-select"></select>
                <button id="accelerate-btn">Beschleunigen</button>
                <div id="travel-info" class="hidden"></div>
            </div>

            <!-- Rechte Seite: Inventar -->
            <div class="panel right-panel" id="inventory"></div>
            
        </div>

        <!-- Hintergrundbild -->
        <img id="background-image" src="./assets/background-game.jpg" alt="Hintergrund">

    </div>

    <script type="module" src="./js/script.js"></script>
</body>
</html>
